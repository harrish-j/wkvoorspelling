<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚽ WK 2026 · Groepsindeling</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1b2e;
      color: #fff;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #003087 0%, #006400 100%);
      padding: 32px 20px 0;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    header h1 { font-size: 2.2rem; font-weight: 800; text-shadow: 2px 2px 6px rgba(0,0,0,0.4); }
    header p  { margin-top: 4px; font-size: 0.95rem; opacity: 0.8; letter-spacing: 1px; }

    /* ── Nav ── */
    .site-nav {
      display: flex;
      justify-content: center;
      gap: 2px;
      margin-top: 16px;
      padding: 0 20px;
    }
    .nav-link {
      color: rgba(255,255,255,0.65);
      text-decoration: none;
      padding: 10px 22px;
      font-weight: 600;
      font-size: 0.88rem;
      letter-spacing: 0.5px;
      border-bottom: 3px solid transparent;
      transition: all 0.18s;
    }
    .nav-link:hover { color: #fff; }
    .nav-link.active { color: #FFD700; border-bottom-color: #FFD700; }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 36px;
      padding: 12px 20px;
      background: rgba(255,255,255,0.05);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
    }
    .stat { text-align: center; }
    .stat-value { font-size: 1.5rem; font-weight: 700; color: #FFD700; }
    .stat-label { font-size: 0.68rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

    /* ── Groups grid ── */
    .groups-container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }
    .section-title {
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      opacity: 0.6;
      margin-bottom: 20px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 18px;
    }

    /* ── Group card ── */
    .group-card {
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      color: #222;
    }
    .group-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 32px rgba(0,0,0,0.6);
    }

    .group-header {
      background: linear-gradient(135deg, #003087 0%, #006400 100%);
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .group-letter {
      font-size: 2.4rem;
      font-weight: 900;
      line-height: 1;
      opacity: 0.95;
    }
    .group-meta { display: flex; flex-direction: column; gap: 2px; }
    .group-title { font-size: 1rem; font-weight: 700; }
    .group-start { font-size: 0.72rem; opacity: 0.7; }

    /* ── Team rows ── */
    .group-teams { padding: 4px 0; }
    .team-row { cursor: pointer; text-decoration: none; color: inherit;
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 9px 16px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.12s;
    }
    .team-row:last-child { border-bottom: none; }
    .team-row:hover { background: #f4f6f8; }

    .team-flag {
      width: 42px;
      height: 28px;
      object-fit: cover;
      border-radius: 3px;
      box-shadow: 0 1px 5px rgba(0,0,0,0.25);
      flex-shrink: 0;
    }
    .team-flag-fallback {
      width: 42px;
      height: 28px;
      border-radius: 3px;
      background: #dde;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 700;
      color: #888;
      flex-shrink: 0;
    }
    .team-name {
      flex: 1;
      font-size: 0.88rem;
      font-weight: 700;
      color: #1a1a2e;
    }
    .team-badges { display: flex; gap: 4px; align-items: center; }
    .host-badge {
      font-size: 0.62rem;
      background: #FFD700;
      color: #000;
      padding: 2px 6px;
      border-radius: 8px;
      font-weight: 800;
    }
    .conf-badge {
      font-size: 0.62rem;
      padding: 2px 6px;
      border-radius: 8px;
      font-weight: 700;
      color: #fff;
    }
    .conf-UEFA     { background: #003399; }
    .conf-CONMEBOL { background: #00843D; }
    .conf-CONCACAF { background: #C8102E; }
    .conf-CAF      { background: #C4910A; }
    .conf-AFC      { background: #D6001C; }
    .conf-OFC      { background: #008264; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      header h1 { font-size: 1.7rem; }
      .groups-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>⚽ WK 2026 Voorspelling</h1>
  <p>FIFA Wereldkampioenschap · USA · Canada · Mexico</p>
  <nav class="site-nav">
    <a href="index.html" class="nav-link">🌍 Landen</a>
    <a href="groepen.html" class="nav-link active">📊 Groepen</a>
    <a href="schema.html" class="nav-link">📅 Groepsfase</a>
    <a href="knockout.html" class="nav-link">🏆 Knockout</a>
    <a href="stadions.html" class="nav-link">🏟️ Stadions</a>
    <a href="scheidsrechters.html" class="nav-link">🎯 Scheidsrechters</a>
  </nav>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-value">48</div><div class="stat-label">Deelnemers</div></div>
  <div class="stat"><div class="stat-value">12</div><div class="stat-label">Groepen</div></div>
  <div class="stat"><div class="stat-value">4</div><div class="stat-label">Teams per groep</div></div>
  <div class="stat"><div class="stat-value">32</div><div class="stat-label">Door naar KO-fase</div></div>
</div>

<div class="groups-container">
  <p class="section-title">Groepsfase · 11 – 27 juni 2026</p>
  <div class="groups-grid" id="groups-grid"></div>
</div>

<script src="data/teams.js"></script>
<script>
  const grid = document.getElementById('groups-grid');

  teamsData.groups.forEach(group => {
    const groupTeams = teamsData.teams.filter(t => t.group === group.id);

    const card = document.createElement('div');
    card.className = 'group-card';

    const teamsHtml = groupTeams.map(team => {
      const flagUrl = `https://flagcdn.com/w80/${team.code}.png`;
      return `
        <a href="land.html?id=${team.id}" class="team-row" style="text-decoration:none;color:inherit">
          <img class="team-flag" src="${flagUrl}" alt="${team.name}"
               onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
          <div class="team-flag-fallback" style="display:none">${team.code.toUpperCase()}</div>
          <span class="team-name">${team.name}</span>
          <div class="team-badges">
            ${team.host ? '<span class="host-badge">🏠</span>' : ''}
            <span class="conf-badge conf-${team.confederation}">${team.confederation}</span>
          </div>
        </a>
      `;
    }).join('');

    card.innerHTML = `
      <div class="group-header">
        <span class="group-letter">${group.id}</span>
        <div class="group-meta">
          <span class="group-title">Groep ${group.id}</span>
          <span class="group-start">Vanaf ${group.startDate}</span>
        </div>
      </div>
      <div class="group-teams">${teamsHtml}</div>
    `;

    grid.appendChild(card);
  });
</script>
</body>
</html>
