      from { opacity: 0; transform: translateY(12px); }

      height: 32px;

      border: none;

      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 3;
      display: flex;
      gap: 6px;
    }

    const counts = {};
    if (typeof matchesData !== "undefined") {
      // Group stage matches

        matchesData.matches.forEach(function(m) {
          counts[m.venue] = (counts[m.venue] || 0) + 1;
        });
      }
      // Knockout rounds — estimate distribution across venues
      // The data only specifies the finale venue explicitly
      if (matchesData.knockoutRounds) {
        matchesData.knockoutRounds.forEach(function(r) {
          if (r.venue) {
            counts[r.venue] = (counts[r.venue] || 0) + 1;
          }
        });
      }
    }
    return counts;

    return n.toLocaleString("nl-NL");
  }

  function createCard(key, venue, index) {
    const mc = matchCounts[key] || 0;
    const pct = Math.round((venue.capacity / MAX_CAPACITY) * 100);
    const imgs = venue.images || [venue.image];
    const hasMultiple = imgs.length > 1;
    const cid = "carousel-" + key;

    let badgesHtml = '';
    if (specialBadges[key]) {
      badgesHtml += '<span class="badge ' + specialBadges[key].cls + '">' + specialBadges[key].text + '</span>';
    }
    if (mc > 0) {
      badgesHtml += '<span class="badge badge-matches">⚽ ' + mc + ' wedstrijd' + (mc !== 1 ? 'en' : '') + '</span>';
    }

    var imgsHtml = imgs.map(function(src) {
      return '<img src="' + src + '" alt="' + venue.name + '">';
    }).join('');

    var arrowsHtml = hasMultiple
      ? '<button class="carousel-arrow prev" data-cid="' + cid + '" data-dir="-1">&#10094;</button>' +
        '<button class="carousel-arrow next" data-cid="' + cid + '" data-dir="1">&#10095;</button>'
      : '';

    var dotsHtml = '';
    if (hasMultiple) {
      dotsHtml = '<div class="carousel-dots">';
      for (var i = 0; i < imgs.length; i++) {
        dotsHtml += '<button class="carousel-dot' + (i === 0 ? ' active' : '') + '" data-cid="' + cid + '" data-idx="' + i + '"></button>';
      }
      dotsHtml += '</div>';
    }

    var card = document.createElement("div");
    card.className = "stadium-card fade-in";
    card.dataset.country = venue.country;
    card.dataset.city = venue.city;
    card.dataset.capacity = venue.capacity;
    card.style.animationDelay = (index * 0.06) + "s";

    card.innerHTML =
      '<div class="card-image" id="' + cid + '" data-idx="0" data-count="' + imgs.length + '">' +
        '<div class="carousel-track">' + imgsHtml + '</div>' +
        arrowsHtml +
        dotsHtml +
        (badgesHtml ? '<div class="card-badges">' + badgesHtml + '</div>' : '') +
      '</div>' +
      '<div class="card-body">' +
        '<div class="stadium-name">' + venue.name + '</div>' +
        '<div class="fifa-name">' + venue.fifaName + '</div>' +
        '<div class="city-row">' +
          '<img src="https://flagcdn.com/w40/' + venue.country + '.png" alt="' + countryNames[venue.country] + '">' +
          '<span>' + venue.city + ', ' + countryNames[venue.country] + '</span>' +
        '</div>' +
        '<div class="capacity-section">' +
          '<div class="capacity-header">' +
            '<span class="capacity-label">Capaciteit</span>' +
            '<span class="capacity-value">' + formatCapacity(venue.capacity) + '</span>' +
          '</div>' +
          '<div class="capacity-bar"><div class="capacity-fill" style="width:' + pct + '%"></div></div>' +
        '</div>' +
        '<div class="facts-grid">' +
          '<div class="fact"><div class="fact-label">Geopend</div><div class="fact-value">' + venue.opened + '</div></div>' +
          '<div class="fact"><div class="fact-label">WK wedstrijden</div><div class="fact-value">' + (mc > 0 ? mc : '–') + '</div></div>' +
          '<div class="fact full-width"><div class="fact-label">Vaste clubs</div><div class="fact-value">' + venue.clubs + '</div></div>' +
          '<div class="fact full-width"><div class="fact-label">Type</div><div class="fact-value">' + venue.type + '</div></div>' +
        '</div>' +
        '<div class="card-desc">' + venue.description + '</div>' +
      '</div>';

    return card;
  }

  // Carousel navigation
  function goToSlide(cid, idx) {
    var container = document.getElementById(cid);
    if (!container) return;
    var count = parseInt(container.dataset.count);
    if (idx < 0) idx = count - 1;
    if (idx >= count) idx = 0;
    container.dataset.idx = idx;
    var track = container.querySelector(".carousel-track");
    track.style.transform = "translateX(-" + (idx * 100) + "%)";
    var dots = container.querySelectorAll(".carousel-dot");
    dots.forEach(function(d, i) { d.classList.toggle("active", i === idx); });
  }

  document.addEventListener("click", function(e) {
    var arrow = e.target.closest(".carousel-arrow");
    if (arrow) {
      e.stopPropagation();
      var cid = arrow.dataset.cid;
      var dir = parseInt(arrow.dataset.dir);
      var container = document.getElementById(cid);
      var cur = parseInt(container.dataset.idx);
      goToSlide(cid, cur + dir);
      return;
    }
    var dot = e.target.closest(".carousel-dot");
    if (dot) {
      e.stopPropagation();
      goToSlide(dot.dataset.cid, parseInt(dot.dataset.idx));
    }
  });

  // Build sorted venue entries
  function getSortedVenues(sortBy) {
    var entries = Object.entries(venueDetails);
    if (sortBy === "capacity-desc") {
      entries.sort(function(a, b) { return b[1].capacity - a[1].capacity; });
    } else if (sortBy === "city-asc") {
      entries.sort(function(a, b) { return a[1].city.localeCompare(b[1].city, "nl"); });
    }
    return entries;
  }

  var grid = document.getElementById("stadiumsGrid");
  var currentFilter = "all";
  var currentSort = "capacity-desc";

  function renderCards() {
    grid.innerHTML = "";
    var entries = getSortedVenues(currentSort);
    var idx = 0;
    var anyVisible = false;
    entries.forEach(function(entry) {
      var key = entry[0], venue = entry[1];
      if (currentFilter !== "all" && venue.country !== currentFilter) return;
      grid.appendChild(createCard(key, venue, idx));
      idx++;
      anyVisible = true;
    });
    if (!anyVisible) {
      grid.innerHTML = '<div class="no-results">Geen stadions gevonden</div>';
    }
  }

  // Filter buttons
  document.querySelectorAll(".filter-btn").forEach(function(btn) {
    btn.addEventListener("click", function() {
      document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
      btn.classList.add("active");
      currentFilter = btn.dataset.filter;
      renderCards();
    });
  });

  // Sort select
  document.getElementById("sortSelect").addEventListener("change", function() {
    currentSort = this.value;
    renderCards();
  });

  // Initial render
  renderCards();
})();
</script>
</body>
</html>
