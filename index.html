<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WK 2026 - Deelnemende Landen</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0d1b2e; color: #fff; min-height: 100vh; }

    header { background: linear-gradient(135deg, #003087 0%, #006400 100%); padding: 32px 20px 0; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.6); }
    header h1 { font-size: 2.6rem; font-weight: 800; letter-spacing: -0.5px; text-shadow: 2px 2px 6px rgba(0,0,0,0.4); }
    header p { margin-top: 6px; font-size: 1rem; opacity: 0.8; letter-spacing: 1px; }

    .site-nav { display: flex; justify-content: center; gap: 2px; margin-top: 16px; padding: 0 20px; }
    .nav-link { color: rgba(255,255,255,0.65); text-decoration: none; padding: 10px 22px; font-weight: 600; font-size: 0.88rem; letter-spacing: 0.5px; border-bottom: 3px solid transparent; transition: all 0.18s; }
    .nav-link:hover { color: #fff; }
    .nav-link.active { color: #FFD700; border-bottom-color: #FFD700; }

    .stats-bar { display: flex; justify-content: center; gap: 40px; padding: 14px 20px; background: rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.08); flex-wrap: wrap; }
    .stat { text-align: center; }
    .stat-value { font-size: 1.6rem; font-weight: 700; color: #FFD700; }
    .stat-label { font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }

    .controls { padding: 24px 20px 8px; max-width: 1400px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .search-box { width: 100%; max-width: 420px; padding: 11px 22px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.07); color: #fff; font-size: 0.95rem; outline: none; transition: border-color 0.2s; }
    .search-box::placeholder { color: rgba(255,255,255,0.4); }
    .search-box:focus { border-color: #FFD700; }

    .filter-tabs { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .filter-btn { padding: 7px 18px; border-radius: 20px; border: 2px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.75); cursor: pointer; font-size: 0.82rem; font-weight: 600; letter-spacing: 0.4px; transition: all 0.18s; }
    .filter-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .filter-btn.active { color: #fff; border-color: transparent; }
    .filter-btn[data-filter="all"].active     { background: #FFD700; color: #000; }
    .filter-btn[data-filter="UEFA"].active    { background: #003399; }
    .filter-btn[data-filter="CONMEBOL"].active{ background: #00843D; }
    .filter-btn[data-filter="CONCACAF"].active{ background: #C8102E; }
    .filter-btn[data-filter="CAF"].active     { background: #C4910A; }
    .filter-btn[data-filter="AFC"].active     { background: #D6001C; }
    .filter-btn[data-filter="OFC"].active     { background: #008264; }

    .teams-count { font-size: 0.85rem; opacity: 0.55; margin-bottom: 4px; }

    .teams-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 16px; max-width: 1400px; margin: 0 auto; padding: 12px 20px 60px; }

    .team-card { background: #fff; border-radius: 12px; overflow: hidden; cursor: pointer; transition: transform 0.18s ease, box-shadow 0.18s ease; box-shadow: 0 4px 18px rgba(0,0,0,0.35); color: #222; }
    .team-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.55); }
    .team-card.hidden { display: none; }

    .flag-container { width: 100%; height: 96px; overflow: hidden; background: #e8e8e8; display: flex; align-items: center; justify-content: center; }
    .flag-container img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .flag-fallback { font-size: 1.4rem; font-weight: 700; color: #999; letter-spacing: 2px; }

    .team-info { padding: 9px 11px 10px; }
    .team-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
    .host-icon { font-size: 0.75rem; flex-shrink: 0; }
    .confederation-badge { display: inline-block; padding: 2px 9px; border-radius: 10px; font-size: 0.68rem; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
    .conf-UEFA     { background: #003399; }
    .conf-CONMEBOL { background: #00843D; }
    .conf-CONCACAF { background: #C8102E; }
    .conf-CAF      { background: #C4910A; }
    .conf-AFC      { background: #D6001C; }
    .conf-OFC      { background: #008264; }

    .no-results { text-align: center; padding: 60px 20px; opacity: 0.4; font-size: 1.1rem; grid-column: 1 / -1; }

    @media (max-width: 600px) {
      header h1 { font-size: 1.9rem; }
      .stats-bar { gap: 20px; }
      .teams-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
    }
  </style>
</head>
<body>

<header>
  <h1>&#9917; WK 2026 Voorspelling</h1>
  <p>FIFA Wereldkampioenschap &middot; USA &middot; Canada &middot; Mexico</p>
  <nav class="site-nav">
    <a href="index.html" class="nav-link active">&#127757; Landen</a>
    <a href="groepen.html" class="nav-link">&#128202; Groepen</a>
    <a href="schema.html" class="nav-link">&#128197; Groepsfase</a>
    <a href="knockout.html" class="nav-link">&#127942; Knockout</a>
    <a href="stadions.html" class="nav-link">&#127951; Stadions</a>
    <a href="scheidsrechters.html" class="nav-link">🎯 Scheidsrechters</a>
  </nav>
</header>

<div class="stats-bar">
  <div class="stat"><div class="stat-value">48</div><div class="stat-label">Deelnemende landen</div></div>
  <div class="stat"><div class="stat-value">6</div><div class="stat-label">Confederaties</div></div>
  <div class="stat"><div class="stat-value">3</div><div class="stat-label">Gastlanden</div></div>
  <div class="stat"><div class="stat-value">104</div><div class="stat-label">Wedstrijden</div></div>
</div>

<div class="controls">
  <input type="search" class="search-box" id="search" placeholder="Zoek een land...">
  <div class="filter-tabs">
    <button class="filter-btn active" data-filter="all">Alle landen</button>
    <button class="filter-btn" data-filter="UEFA">UEFA (16)</button>
    <button class="filter-btn" data-filter="CONMEBOL">CONMEBOL (6)</button>
    <button class="filter-btn" data-filter="CONCACAF">CONCACAF (6)</button>
    <button class="filter-btn" data-filter="CAF">CAF (10)</button>
    <button class="filter-btn" data-filter="AFC">AFC (9)</button>
    <button class="filter-btn" data-filter="OFC">OFC (1)</button>
  </div>
  <div class="teams-count" id="teams-count"></div>
</div>

<div class="teams-grid" id="teams-grid"></div>

<script src="data/teams.js"></script>
<script>
  var grid        = document.getElementById('teams-grid');
  var searchInput = document.getElementById('search');
  var filterBtns  = document.querySelectorAll('.filter-btn');
  var countEl     = document.getElementById('teams-count');
  var currentFilter = 'all';
  var currentSearch = '';

  function buildCards() {
    teamsData.teams.forEach(function(team) {
      var card = document.createElement('div');
      card.className = 'team-card';
      card.dataset.id   = team.id;
      card.dataset.conf = team.confederation;
      card.dataset.name = team.name.toLowerCase();
      var flagUrl = 'https://flagcdn.com/w320/' + team.code + '.png';
      card.innerHTML =
        '<div class="flag-container">' +
          '<img src="' + flagUrl + '" alt="' + team.name + ' vlag" loading="lazy"' +
               ' onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' +
          '<div class="flag-fallback" style="display:none">' + team.code.toUpperCase() + '</div>' +
        '</div>' +
        '<div class="team-info">' +
          '<div class="team-name">' + team.name + (team.host ? ' <span class="host-icon" title="Gastland">&#127968;</span>' : '') + '</div>' +
          '<span class="confederation-badge conf-' + team.confederation + '">' + team.confederation + '</span>' +
        '</div>';
      grid.appendChild(card);
      card.addEventListener('click', function() {
        window.location.href = 'land.html?id=' + team.id;
      });
    });
  }

  function applyFilters() {
    var visible = 0;
    grid.querySelectorAll('.team-card').forEach(function(card) {
      var matchConf   = currentFilter === 'all' || card.dataset.conf === currentFilter;
      var matchSearch = card.dataset.name.includes(currentSearch);
      var show = matchConf && matchSearch;
      card.classList.toggle('hidden', !show);
      if (show) visible++;
    });
    var noRes = grid.querySelector('.no-results');
    if (visible === 0) {
      if (!noRes) {
        noRes = document.createElement('div');
        noRes.className = 'no-results';
        noRes.textContent = 'Geen landen gevonden';
        grid.appendChild(noRes);
      }
    } else if (noRes) {
      noRes.remove();
    }
    countEl.textContent = visible + ' land' + (visible !== 1 ? 'en' : '') + ' weergegeven';
  }

  filterBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      filterBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentFilter = btn.dataset.filter;
      applyFilters();
    });
  });

  searchInput.addEventListener('input', function(e) {
    currentSearch = e.target.value.toLowerCase();
    applyFilters();
  });

  buildCards();
  applyFilters();
</script>
</body>
</html>
